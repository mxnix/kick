name: kick
description: "Kick: a local OpenAI-compatible proxy for Gemini CLI with a Flutter shell"
publish_to: "none"
version: 1.1.3+8

environment:
  sdk: ^3.11.1

dependencies:
  aptabase_flutter: ^0.4.1
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dynamic_color: ^1.8.1
  drift: ^2.32.0
  file_picker: ^10.3.10
  flutter_foreground_task: ^9.2.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  hive: ^2.2.3
  http: ^1.5.0
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  sqlite3: ^3.2.0
  sqlite3_flutter_libs: ^0.6.0+eol
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  window_manager: ^0.5.1
  share_plus: ^12.0.1
  package_info_plus: ^8.3.1
  tray_manager: ^0.5.2
  launch_at_startup: ^0.3.1
  local_notifier: ^0.1.6
  sentry_flutter: ^9.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: KickGoogleSans
      fonts:
        - asset: assets/fonts/google_sans/GoogleSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/google_sans/GoogleSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/google_sans/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/google_sans/GoogleSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/google_sans/GoogleSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/google_sans/GoogleSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/google_sans/GoogleSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/google_sans/GoogleSans-BoldItalic.ttf
          weight: 700
          style: italic
  assets:
    - android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
    - windows/runner/resources/app_icon.ico
