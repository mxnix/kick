name: Feature request
description: Suggest an improvement or a new feature for KiCk
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this request solve?
      description: Describe the current pain point or limitation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What solution do you propose?
      description: Describe the desired behavior briefly and concretely.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What alternatives have you already considered?
      description: If there are workarounds or tradeoffs, describe them here.

  - type: dropdown
    id: platform
    attributes:
      label: Which platforms does this request affect?
      multiple: true
      options:
        - Windows
        - Linux
        - Android
        - Desktop
        - Platform-independent
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, API examples, or any other useful detail.
