name: Bug report
description: Report a bug or regression in KiCk
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where does the issue reproduce?
      options:
        - Windows
        - Linux
        - Android
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: KiCk version
      description: Enter the version from the About screen or the GitHub release.
      placeholder: 1.0.0
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe the shortest sequence that reproduces the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Send a request ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: If you attach exported logs, make sure they are safe to publish.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Any extra detail that could speed up investigation.
